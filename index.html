<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>나눔과기쁨 봉사 일정표 (PWA)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous"></script>

        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .print-hide { display: none !important; }

<body class="bg-gray-50 antialiased overflow-x-hidden selection:bg-orange-200">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==============================================================
        // ☁️ Firebase 초기화 (프로젝트 ID: nanum-volunteer)
        // ==============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB7dTDbRW8L5vsipfBOphrMWs7Rzkm7ImI",
            authDomain: "nanum-volunteer.firebaseapp.com",
            projectId: "nanum-volunteer",
            storageBucket: "nanum-volunteer.firebasestorage.app",
            messagingSenderId: "720660924695",
            appId: "1:720660924695:web:84c6f21570033c00454f52"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // 💡 지난달 데이터를 그대로 유지하는 영구 고정 컬렉션
        const DB_COLLECTION = 'nanum_schedules';

        const { useState, useEffect } = React;

        // --- SVG 아이콘 ---
        const ChevronLeft = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const ChevronRight = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const CarIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a2 2 0 0 0-1.6-.8H9.3a2 2 0 0 0-1.6.8L5 11l-5.16.86a1 1 0 0 0-.84.99V16h3m10 0a2 2 0 1 1-4 0m4 0a2 2 0 1 0-4 0m-10 0a2 2 0 1 1-4 0m4 0a2 2 0 1 0-4 0"></path></svg>;
        const UserIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const XIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const AlertCircle = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const RefreshIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>;
        const DownloadIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const TableIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="9" x2="9" y2="21"></line><line x1="15" y1="9" x2="15" y2="21"></line></svg>;
        const FileTextIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const PrinterIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
        const PencilIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const PlusCircleIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>;
        const TrashIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const BellIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [currentDate, setCurrentDate] = useState(() => {
                const today = new Date();
                return new Date(today.getFullYear(), today.getMonth() + 1, 1);
            });
            const [schedule, setSchedule] = useState({});
            const [selectedDateStr, setSelectedDateStr] = useState('');
            
            // 모달 상태
            const [isApplyModalOpen, setIsApplyModalOpen] = useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            
            // 공통 입력 상태
            const [applicantName, setApplicantName] = useState('');
            const [applicantPin, setApplicantPin] = useState('');
            const [applicantRole, setApplicantRole] = useState('general');
            const [formError, setFormError] = useState('');
            
            // 취소/수정 관련 상태
            const [targetDate, setTargetDate] = useState(''); 
            const [targetPinInput, setTargetPinInput] = useState('');
            const [matchedCandidates, setMatchedCandidates] = useState([]);
            
            // 수정 전용 상태
            const [editStep, setEditStep] = useState(1);
            const [selectedEditCandidate, setSelectedEditCandidate] = useState(null);
            
            const [toastMessage, setToastMessage] = useState({ show: false, message: '', type: '' });
            const [authError, setAuthError] = useState(''); 
            const [isInstallable, setIsInstallable] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isExportMenuOpen, setIsExportMenuOpen] = useState(false);
            
            const weekDays = ['일', '월', '화', '수', '목', '금', '토'];

            // 💡 [입력 기간 제한 로직 계산]
            // 오늘 날짜 기준 세팅 (시간은 자정으로 리셋하여 정확한 날짜만 비교)
            const today = new Date();
            today.setHours(0, 0, 0, 0); 

            // 현재 보고 있는 달의 1일
            const viewedMonthStart = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
            
            // 보고 있는 달의 '오픈일' = 그 달의 1일에서 5일을 뺀 날짜
            const openDate = new Date(viewedMonthStart);
            openDate.setDate(viewedMonthStart.getDate() - 5);

            // 현실의 이번 달 1일
            const currentMonthStart = new Date(today.getFullYear(), today.getMonth(), 1);

            // 판단: 보고 있는 달이 '과거이거나 이번 달'이면 무조건 입력 가능
            const isPastOrCurrent = viewedMonthStart.getTime() <= currentMonthStart.getTime();
            // 판단: 보고 있는 달이 '미래'라면, 오늘 날짜가 오픈일(5일 전)을 지났을 때만 입력 가능
            const canApply = isPastOrCurrent || (today.getTime() >= openDate.getTime());


            // 저장된 정보 불러오기/저장하기
            const loadSavedInfo = () => {
                const savedName = localStorage.getItem('nanum_saved_name');
                const savedPin = localStorage.getItem('nanum_saved_pin');
                if (savedName) setApplicantName(savedName);
                if (savedPin) {
                    setApplicantPin(savedPin);
                    setTargetPinInput(savedPin);
                }
            };

            const saveInfoToLocal = (name, pin) => {
                localStorage.setItem('nanum_saved_name', name);
                localStorage.setItem('nanum_saved_pin', pin);
            };

            // 알림 권한 요청 (스마트폰, PC 알림 띄우기)
            const enableNotification = () => {
                if (!("Notification" in window)) {
                    showToast("이 기기는 알림 기능을 지원하지 않습니다.", "error");
                    return;
                }
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        showToast("알림이 설정되었습니다! 오픈 시 알려드릴게요.", "success");
                        // 테스트용 즉시 알림 발송
                        new Notification("나눔과기쁨 봉사일정", { 
                            body: "알림 설정 완료! 봉사 신청 기간이 되면 알려드립니다.",
                            icon: "IMG_1347.jpeg"
                        });
                    } else {
                        showToast("알림 권한이 거부되었습니다.", "error");
                    }
                });
            };

            useEffect(() => {
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } 
                    catch (error) { console.error("인증 실패:", error); }
                };
                initAuth();
                const unsubscribeAuth = onAuthStateChanged(auth, setUser);
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const schedulesRef = collection(db, DB_COLLECTION);
                const unsubscribeSnapshot = onSnapshot(schedulesRef, (snapshot) => {
                    const newSchedule = {};
                    snapshot.forEach(doc => { newSchedule[doc.id] = doc.data(); });
                    setSchedule(newSchedule);
                }, (error) => console.error("데이터 동기화 오류:", error));
                return () => unsubscribeSnapshot();
            }, [user]);

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setIsInstallable(true);
                });
            }, []);

            const handleRefresh = async () => {
                if (!user) { showToast('서버에 연결 중입니다.', 'error'); return; }
                showToast('최신 일정을 확인하는 중입니다...', 'info');
                try {
                    const schedulesRef = collection(db, DB_COLLECTION);
                    const snapshot = await getDocs(schedulesRef);
                    const newSchedule = {};
                    snapshot.forEach(doc => { newSchedule[doc.id] = doc.data(); });
                    setSchedule(newSchedule);
                    setTimeout(() => showToast('최신 일정으로 동기화되었습니다.', 'success'), 600);
                } catch (error) { showToast('동기화에 실패했습니다.', 'error'); }
            };

            const formatDate = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const showToast = (message, type = 'info') => {
                setToastMessage({ show: true, message, type });
                setTimeout(() => setToastMessage({ show: false, message: '', type: '' }), 2500);
            };

            const getCalendarDays = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const prevMonthDays = new Date(year, month, 0).getDate();
                const days = [];
                for (let i = firstDay - 1; i >= 0; i--) days.push({ date: new Date(year, month - 1, prevMonthDays - i), isCurrentMonth: false });
                for (let i = 1; i <= daysInMonth; i++) days.push({ date: new Date(year, month, i), isCurrentMonth: true });
                const remaining = 42 - days.length;
                for (let i = 1; i <= remaining; i++) days.push({ date: new Date(year, month + 1, i), isCurrentMonth: false });
                return days;
            };

            const isWeekendString = (dateStr) => {
                const [y, m, d] = dateStr.split('-');
                const date = new Date(y, m - 1, d);
                return date.getDay() === 0 || date.getDay() === 6;
            };

            const handleDayClick = (dayObj) => {
                if (!dayObj.isCurrentMonth) { setSelectedDateStr(''); return; }
                
                // 💡 오픈 전인 달은 달력에서 아예 클릭을 막음
                if (!canApply) {
                    showToast('지금은 입력할 수 없습니다.', 'error');
                    return;
                }

                const date = dayObj.date;
                const dayOfWeek = date.getDay();
                if (dayOfWeek === 0 || dayOfWeek === 6) { showToast('주말 및 공휴일은 봉사가 없습니다.', 'error'); return; }
                
                const clickedDateStr = formatDate(date);
                if (selectedDateStr === clickedDateStr) {
                    setTargetDate(clickedDateStr);
                    loadSavedInfo(); 
                    setFormError('');
                    setIsApplyModalOpen(true);
                } else {
                    setSelectedDateStr(clickedDateStr);
                }
            };

            const handleApplySubmit = async (e) => {
                e.preventDefault();
                if (!user) { setFormError('서버 연결 중입니다. 잠시 후 시도해주세요.'); return; }
                if (!targetDate) { setFormError('날짜를 선택해주세요.'); return; }
                if (!applicantName.trim()) { setFormError('이름을 입력해주세요.'); return; }
                if (applicantPin.length !== 4) { setFormError('비밀번호 4자리를 입력해주세요.'); return; }

                const dayData = schedule[targetDate] || { driver: null, general: [] };
                let newDayData = { ...dayData };

                if (applicantRole === 'driver') {
                    if (dayData.driver) { setFormError('운전 봉사는 이미 마감되었습니다.'); return; }
                    newDayData.driver = { name: applicantName.trim(), pin: applicantPin };
                } else {
                    if (dayData.general.length >= 2) { setFormError('일반 봉사는 이미 마감되었습니다.'); return; }
                    newDayData.general = [...dayData.general, { name: applicantName.trim(), pin: applicantPin }];
                }

                try {
                    setIsApplyModalOpen(false);
                    setSelectedDateStr(''); 
                    saveInfoToLocal(applicantName.trim(), applicantPin); 
                    const docRef = doc(db, DB_COLLECTION, targetDate);
                    await setDoc(docRef, newDayData);
                    showToast(`${targetDate.split('-')[2]}일 신청 완료`, 'success');
                } catch(err) { showToast('서버 오류로 신청에 실패했습니다.', 'error'); }
            };

            const searchCandidatesByPin = (dateStr, pin) => {
                const dayData = schedule[dateStr];
                if (!dayData) return [];
                const matches = [];
                if (dayData.driver && dayData.driver.pin === pin) matches.push({ role: 'driver', name: dayData.driver.name, originalRole: 'driver', originalIndex: null });
                dayData.general.forEach((person, idx) => { if (person.pin === pin) matches.push({ role: 'general', index: idx, name: person.name, originalRole: 'general', originalIndex: idx }); });
                return matches;
            };

            const handleDeleteSearch = (e) => {
                e.preventDefault();
                if (!targetDate) { setFormError('날짜를 선택해주세요.'); return; }
                if (targetPinInput.length !== 4) { setFormError('비밀번호 4자리를 입력해주세요.'); return; }
                const matches = searchCandidatesByPin(targetDate, targetPinInput);
                if (matches.length === 0) { setFormError('비밀번호가 일치하는 내역이 없습니다.'); return; }
                if (matches.length === 1) executeDelete(matches[0]);
                else { setMatchedCandidates(matches); setFormError(''); }
            };

            const executeDelete = async (target) => {
                const dayData = schedule[targetDate];
                let newDayData = { ...dayData, general: [...dayData.general] };
                if (target.role === 'driver') newDayData.driver = null;
                else newDayData.general.splice(target.index, 1);
                try {
                    setIsDeleteModalOpen(false);
                    setSelectedDateStr('');
                    const docRef = doc(db, DB_COLLECTION, targetDate);
                    if (!newDayData.driver && newDayData.general.length === 0) await deleteDoc(docRef);
                    else await setDoc(docRef, newDayData);
                    showToast('신청 내역이 취소되었습니다.', 'success');
                } catch(err) { showToast('서버 오류로 취소에 실패했습니다.', 'error'); }
            };

            const handleEditSearch = (e) => {
                e.preventDefault();
                if (!targetDate) { setFormError('날짜를 선택해주세요.'); return; }
                if (targetPinInput.length !== 4) { setFormError('비밀번호 4자리를 입력해주세요.'); return; }
                const matches = searchCandidatesByPin(targetDate, targetPinInput);
                if (matches.length === 0) { setFormError('비밀번호가 일치하는 내역이 없습니다.'); return; }
                if (matches.length === 1) openEditForm(matches[0]);
                else { setMatchedCandidates(matches); setEditStep(2); setFormError(''); }
            };

            const openEditForm = (candidate) => {
                setSelectedEditCandidate(candidate);
                setApplicantName(candidate.name);
                setApplicantRole(candidate.originalRole);
                setEditStep(3); setFormError(''); setMatchedCandidates([]);
            };

            const handleEditSubmit = async (e) => {
                e.preventDefault();
                const dayData = schedule[targetDate];
                let newDayData = { ...dayData, general: [...dayData.general] };
                if (selectedEditCandidate.originalRole === 'driver') newDayData.driver = null;
                else newDayData.general.splice(selectedEditCandidate.originalIndex, 1);
                
                if (applicantRole === 'driver') {
                    if (newDayData.driver) { setFormError('이미 다른 운전 봉사자가 있습니다.'); return; }
                    newDayData.driver = { name: applicantName.trim(), pin: targetPinInput };
                } else {
                    if (newDayData.general.length >= 2) { setFormError('일반 봉사 자리가 없습니다.'); return; }
                    newDayData.general.push({ name: applicantName.trim(), pin: targetPinInput });
                }

                try {
                    setIsEditModalOpen(false);
                    setSelectedDateStr('');
                    saveInfoToLocal(applicantName.trim(), targetPinInput); 
                    const docRef = doc(db, DB_COLLECTION, targetDate);
                    await setDoc(docRef, newDayData);
                    showToast('수정이 완료되었습니다.', 'success');
                } catch(err) { showToast('서버 오류로 수정에 실패했습니다.', 'error'); }
            };

            const handleExportExcel = () => { /* 엑셀 출력 코드 유지 */
                setIsExportMenuOpen(false);
                let csvContent = "\uFEFF날짜,요일,운전봉사(1명),일반봉사(1),일반봉사(2)\n";
                getCalendarDays().forEach(dayObj => {
                    const date = dayObj.date;
                    if(!dayObj.isCurrentMonth) return;
                    const dayOfWeek = date.getDay();
                    if(dayOfWeek === 0 || dayOfWeek === 6) return;
                    const dateStr = formatDate(date);

                    csvContent += `${dateStr},${dayStr},${driver},${gen1},${gen2}\n`;
                });

    <script>
        const manifest = {
            "name": "나눔과기쁨 봉사 일정표",
            "short_name": "봉사일정",
            "start_url": window.location.href,
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#ea580c",
            "icons": [{ "src": "IMG_1347.jpeg", "sizes": "512x512", "type": "image/jpeg", "purpose": "any maskable" }]
        };
        const manifestUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/json' }));
        document.getElementById('manifest-placeholder').setAttribute('href', manifestUrl);

        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'volunteer-app-v9';
                self.addEventListener('install', (event) => self.skipWaiting());
                self.addEventListener('activate', (event) => self.clients.claim());
                self.addEventListener('fetch', (event) => {
                    event.respondWith(fetch(event.request).catch(() => new Response('오프라인 상태입니다.')));
                });
            `;
            const swUrl = URL.createObjectURL(new Blob([swCode], { type: 'application/javascript' }));
            window.addEventListener('load', () => navigator.serviceWorker.register(swUrl).catch(console.log));
        }
    </script>
</body>
</html>
