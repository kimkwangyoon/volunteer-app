        const getChosung = (str) => {
            const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            let result = "";
            for(let i=0; i<str.length; i++) {
                const code = str.charCodeAt(i) - 44032;
                if(code > -1 && code < 11172) result += cho[Math.floor(code / 588)];
                else result += str.charAt(i);
            }
            return result;
        };

                if (!dayData || (!dayData.driver && dayData.general.length === 0)) { setFormError('해당 날짜에 등록된 일정이 없습니다.'); return; }
                
                const matches = [];
                if (dayData.driver) matches.push({ role: 'driver', name: dayData.driver.name, originalRole: 'driver', originalIndex: null, pin: dayData.driver.pin });
                dayData.general.forEach((person, idx) => { matches.push({ role: 'general', index: idx, name: person.name, originalRole: 'general', originalIndex: idx, pin: person.pin }); });
                
                setMatchedCandidates(matches);
                setFormError('');
                if (isEditModalOpen) setEditStep(2);
            };

            const handleDownloadICS = (dateStr, roleStr) => {
                const yyyy = dateStr.split('-')[0]; const mm = dateStr.split('-')[1]; const dd = dateStr.split('-')[2];
                const startStr = `${yyyy}${mm}${dd}`;
                const endDate = new Date(Number(yyyy), Number(mm) - 1, Number(dd) + 1);
                const endY = endDate.getFullYear(); const endM = String(endDate.getMonth() + 1).padStart(2, '0'); const endD = String(endDate.getDate()).padStart(2, '0');
                const endStr = `${endY}${endM}${endD}`;
                const icsContent = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Nanum//Volunteer//KO\nBEGIN:VEVENT\nDTSTART;VALUE=DATE:${startStr}\nDTEND;VALUE=DATE:${endStr}\nSUMMARY:[나눔과기쁨] 봉사 일정 (${roleStr})\nDESCRIPTION:나눔과기쁨 ${roleStr} 봉사 일정입니다. 잊지 말고 참석해 주세요!\nEND:VEVENT\nEND:VCALENDAR`;
                const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a'); link.href = url; link.setAttribute('download', `봉사일정_${startStr}.ics`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                showToast('캘린더 파일이 다운로드되었습니다.', 'info');
            };

            const handleExportPDF = async () => {
                const element = document.getElementById('calendar-export-area');
                if (!element) return;
                showToast('고품질 PDF 문서를 생성 중입니다. 잠시만 기다려주세요...', 'info');
                
                try {
                    const canvas = await window.html2canvas(element, { 
                        scale: 2, 
                        useCORS: true,
                        windowWidth: 1200,
                        onclone: (clonedDoc) => {
                            const exportArea = clonedDoc.getElementById('calendar-export-area');
                            exportArea.style.width = '1200px';
                            exportArea.style.padding = '30px';
                            exportArea.style.backgroundColor = '#ffffff';

                            // 💡 PDF에서도 grid-cols-5로 적용되도록 수정
                            const gridContainer = clonedDoc.querySelector('.grid.grid-cols-5');
                            if(gridContainer) {
                                gridContainer.style.backgroundColor = '#9ca3af';
                                gridContainer.style.border = '2px solid #9ca3af';
                                gridContainer.style.gap = '2px';
                            }

                            // 💡 5줄(25칸)일 때는 넉넉하게, 6줄(30칸)일 때는 알맞게 조절
                            const cells = clonedDoc.querySelectorAll('.calendar-cell');
                            const isFiveRows = cells.length === 25;
                            cells.forEach(cell => {
                                cell.style.minHeight = isFiveRows ? '165px' : '135px';
                            });

                            const hides = clonedDoc.querySelectorAll('.print-hide');
                            hides.forEach(el => el.style.display = 'none');
                        }
                    });
                    
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('landscape', 'mm', 'a4');
                    
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    const margin = 5; 
                    const maxW = pdfWidth - (margin * 2);
                    const maxH = pdfHeight - (margin * 2);
                    
                    const ratio = Math.min(maxW / canvas.width, maxH / canvas.height);
                    const imgW = canvas.width * ratio;
                    const imgH = canvas.height * ratio;
                    
                    const x = (pdfWidth - imgW) / 2;
                    const y = (pdfHeight - imgH) / 2;
                    
                    pdf.addImage(canvas.toDataURL('image/jpeg', 0.98), 'JPEG', x, y, imgW, imgH);
                    pdf.save(`${currentDate.getFullYear()}년_${currentDate.getMonth()+1}월_봉사일정.pdf`);
                    
                    showToast('PDF 다운로드가 완료되었습니다.', 'success');
                } catch(error) {
                    console.error(error);
                    showToast('PDF 변환에 실패했습니다.', 'error');
                }
            };

            const handleRefresh = async () => {
                if (!user) { showToast('서버에 연결 중입니다.', 'error'); return; }
                showToast('최신 일정을 확인하는 중입니다...', 'info');
                try {
                    const schedulesRef = collection(db, DB_COLLECTION);
                    const snapshot = await getDocs(schedulesRef);
                    const newSchedule = {};
                    snapshot.forEach(doc => { newSchedule[doc.id] = doc.data(); });
                    setSchedule(newSchedule);
                    setTimeout(() => showToast('최신 일정으로 동기화되었습니다.', 'success'), 600);
                } catch (error) { showToast('동기화에 실패했습니다.', 'error'); }
            };

            const formatDate = (date) => {
                const year = date.getFullYear(); const month = String(date.getMonth() + 1).padStart(2, '0'); const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const showToast = (message, type = 'info') => {
                setToastMessage({ show: true, message, type });
                setTimeout(() => setToastMessage({ show: false, message: '', type: '' }), 2500);
            };

            // 💡 [수정] 토요일과 일요일을 모두 제거하여 평일(5일)만 남기는 로직
            const getCalendarDays = () => {
                const year = currentDate.getFullYear(); const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay(); 
                
                let startDay = firstDay === 0 ? 6 : firstDay - 1; 
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const prevMonthDays = new Date(year, month, 0).getDate();
                
                const allDays = [];
                for (let i = startDay - 1; i >= 0; i--) {
                    allDays.push({ date: new Date(year, month - 1, prevMonthDays - i), isCurrentMonth: false });
                }
                for (let i = 1; i <= daysInMonth; i++) {
                    allDays.push({ date: new Date(year, month, i), isCurrentMonth: true });
                }
                let remainder = allDays.length % 7;
                let nextDay = 1;
                while (remainder !== 0 || allDays.length < 35) {
                    allDays.push({ date: new Date(year, month + 1, nextDay++), isCurrentMonth: false });
                    remainder = allDays.length % 7;
                }
                
                // 💡 일요일(0)과 토요일(6)을 모두 필터링하여 월~금만 반환
                return allDays.filter(d => d.date.getDay() !== 0 && d.date.getDay() !== 6); 
            };

            const handleDayClick = (dayObj) => {
                if (!dayObj.isCurrentMonth) { setSelectedDateStr(''); return; }
                if (!canApply) { showToast('지금은 입력할 수 없습니다.', 'error'); return; }

                const date = dayObj.date; const dateStr = formatDate(date); const isHoliday = !!HOLIDAYS[dateStr]; 
                // 토요일, 일요일 클릭 방지 (이제 화면에 없지만 방어용으로 유지)
                if (date.getDay() === 0 || date.getDay() === 6 || isHoliday) { showToast('주말 및 공휴일은 봉사가 없습니다.', 'error'); return; }
                
                if (selectedDateStr === dateStr) {
                    setTargetDate(dateStr); loadSavedInfo(); setFormError(''); setShowNameList(false); setIsApplyModalOpen(true);
                } else { setSelectedDateStr(dateStr); }
            };

            const handleApplySubmit = async (e) => {
                e.preventDefault();
                if (!user) { setFormError('서버 연결 중입니다. 잠시 후 시도해주세요.'); return; }
                if (!targetDate) { setFormError('날짜를 선택해주세요.'); return; }
                if (!applicantName.trim()) { setFormError('이름을 입력해주세요.'); return; }
                if (applicantPin.length !== 4) { setFormError('비밀번호 4자리를 입력해주세요.'); return; }

                const dayData = schedule[targetDate] || { driver: null, general: [] };
                let newDayData = { ...dayData };

                if (applicantRole === 'driver') {
                    if (dayData.driver) { setFormError('운전 봉사는 이미 마감되었습니다.'); return; }
                    newDayData.driver = { name: applicantName.trim(), pin: applicantPin };
                } else {
                    if (dayData.general.length >= 2) { setFormError('일반 봉사는 이미 마감되었습니다.'); return; }
                    newDayData.general = [...dayData.general, { name: applicantName.trim(), pin: applicantPin }];
                }

                try {
                    setIsApplyModalOpen(false); setSelectedDateStr(''); 
                    saveInfoToLocal(applicantName.trim(), applicantPin); 
                    const docRef = doc(db, DB_COLLECTION, targetDate); await setDoc(docRef, newDayData);
                    setSuccessDialog({ isOpen: true, dateStr: targetDate, roleStr: applicantRole === 'driver' ? '운전' : '일반' });
                } catch(err) { showToast('서버 오류로 신청에 실패했습니다.', 'error'); }
            };

            const searchCandidatesByPin = (dateStr, pin) => {
                const dayData = schedule[dateStr]; if (!dayData) return [];
                const matches = [];
                if (dayData.driver && dayData.driver.pin === pin) matches.push({ role: 'driver', name: dayData.driver.name, originalRole: 'driver', originalIndex: null, pin: dayData.driver.pin });
                dayData.general.forEach((person, idx) => { if (person.pin === pin) matches.push({ role: 'general', index: idx, name: person.name, originalRole: 'general', originalIndex: idx, pin: person.pin }); });
                return matches;
            };

            const handleDeleteSearch = (e) => {
                e.preventDefault();
                if (!targetDate) { setFormError('날짜를 선택해주세요.'); return; }
                if (targetPinInput.length !== 4) { setFormError('비밀번호 4자리를 입력해주세요.'); return; }
                const matches = searchCandidatesByPin(targetDate, targetPinInput);
                if (matches.length === 0) { setFormError('비밀번호가 일치하는 내역이 없습니다.'); return; }
                if (matches.length === 1) executeDelete(matches[0]);
                else { setMatchedCandidates(matches); setFormError(''); }
            };

            const executeDelete = async (target) => {
                const dayData = schedule[targetDate];
                let newDayData = { ...dayData, general: [...dayData.general] };
                if (target.role === 'driver') newDayData.driver = null; else newDayData.general.splice(target.index, 1);
                try {
                    setIsDeleteModalOpen(false); setSelectedDateStr('');
                    const docRef = doc(db, DB_COLLECTION, targetDate);
                    if (!newDayData.driver && newDayData.general.length === 0) await deleteDoc(docRef); else await setDoc(docRef, newDayData);
                    showToast('신청 내역이 취소되었습니다.', 'success');
                } catch(err) { showToast('서버 오류로 취소에 실패했습니다.', 'error'); }
            };

            const handleEditSearch = (e) => {
                e.preventDefault();
                if (!targetDate) { setFormError('날짜를 선택해주세요.'); return; }
                if (targetPinInput.length !== 4) { setFormError('비밀번호 4자리를 입력해주세요.'); return; }
                const matches = searchCandidatesByPin(targetDate, targetPinInput);
                if (matches.length === 0) { setFormError('비밀번호가 일치하는 내역이 없습니다.'); return; }
                if (matches.length === 1) openEditForm(matches[0]);
                else { setMatchedCandidates(matches); setEditStep(2); setFormError(''); }
            };

            const openEditForm = (candidate) => {
                setSelectedEditCandidate(candidate); setApplicantName(candidate.name); setApplicantRole(candidate.originalRole);
                setApplicantPin(candidate.pin || targetPinInput);
                setEditStep(3); setFormError(''); setMatchedCandidates([]); setShowNameList(false);
            };

            const handleEditSubmit = async (e) => {
                e.preventDefault();
                if (!applicantPin || applicantPin.length !== 4) { setFormError('비밀번호 4자리를 입력해주세요.'); return; }
                const dayData = schedule[targetDate];
                let newDayData = { ...dayData, general: [...dayData.general] };
                if (selectedEditCandidate.originalRole === 'driver') newDayData.driver = null; else newDayData.general.splice(selectedEditCandidate.originalIndex, 1);
                
                if (applicantRole === 'driver') {
                    if (newDayData.driver) { setFormError('이미 다른 운전 봉사자가 있습니다.'); return; }
                    newDayData.driver = { name: applicantName.trim(), pin: applicantPin };
                } else {
                    if (newDayData.general.length >= 2) { setFormError('일반 봉사 자리가 없습니다.'); return; }
                    newDayData.general.push({ name: applicantName.trim(), pin: applicantPin });
                }

                try {
                    setIsEditModalOpen(false); setSelectedDateStr(''); saveInfoToLocal(applicantName.trim(), applicantPin); 
                    const docRef = doc(db, DB_COLLECTION, targetDate); await setDoc(docRef, newDayData);
                    showToast('수정이 완료되었습니다.', 'success');
                } catch(err) { showToast('서버 오류로 수정에 실패했습니다.', 'error'); }
            };

            const filteredMembers = members.filter(m => {
                if (!applicantName) return true;
                const searchLower = applicantName.toLowerCase();
                const nameLower = m.name.toLowerCase();
                return nameLower.includes(searchLower) || getChosung(nameLower).includes(getChosung(searchLower));
            });

            return (
                <div className="min-h-[100dvh] bg-gray-50 flex flex-col font-sans pb-28">
                    <div id="calendar-export-area" className="bg-white flex-1 flex flex-col w-full h-full">
                        <header className="px-4 py-5 sm:px-6 flex justify-between items-center border-b border-gray-100">
                            <h1 className="text-xl sm:text-2xl md:text-3xl font-bold text-orange-900 flex items-center">
                                <img src="IMG_1347.jpeg" alt="로고" className="w-8 h-8 sm:w-10 sm:h-10 mr-2 sm:mr-3 rounded-full border border-orange-200 shadow-sm" onError={(e) => { e.target.style.display = 'none'; }} />
                                나눔과기쁨 봉사 일정표
                            </h1>
                            <div className="flex gap-2 sm:gap-3 print-hide">
                                <button onClick={() => { setIsSettingsModalOpen(true); if(!isAdmin) { setAdminPwInput(''); setFormError(''); } }} className={`bg-white border text-gray-700 px-3 py-2 rounded-full shadow-sm text-sm font-bold active:bg-gray-100 flex items-center transition-colors ${isAdmin ? 'border-orange-500 text-orange-700 bg-orange-50' : 'border-gray-200'}`}>
                                    {isAdmin ? <span className="text-base sm:mr-1">👑</span> : <SettingsIcon className="w-4 h-4 sm:mr-1.5" />}
                                    <span className="hidden sm:inline">관리자</span>
                                </button>
                                <button onClick={handleRefresh} className="bg-white border border-gray-200 text-gray-700 px-3 py-2 rounded-full shadow-sm text-sm font-bold active:bg-gray-100 flex items-center transition-colors"><RefreshIcon className="w-4 h-4 sm:mr-1.5" /> <span className="hidden sm:inline">동기화</span></button>
                                <button onClick={handleExportPDF} className="bg-orange-600 text-white px-3 py-2 rounded-full shadow-sm text-sm font-bold active:bg-orange-700 flex items-center transition-colors"><PrinterIcon className="w-4 h-4 sm:mr-1.5" /> <span className="hidden sm:inline">출력(PDF)</span></button>
                            </div>
                        </header>

                        {!canApply && (
                            <div className="scrolling-wrapper print-hide">
                                <div className="scrolling-content">
                                    📢 {currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월 봉사 일정은 [ {openDate.getMonth() + 1}월 {openDate.getDate()}일 ] 부터 입력이 가능합니다! 잊지 말고 신청해 주세요 😊
                                </div>
                            </div>
                        )}

                        <div className="flex-1 pt-6 pb-8 px-2 sm:px-4">
                            <div className="flex items-center justify-center mb-6 gap-4 sm:gap-8">
                                <button onClick={() => { setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1)); setSelectedDateStr(''); }} className="p-2 text-orange-600 active:bg-orange-100 rounded-full print-hide"><ChevronLeft className="w-6 h-6 sm:w-8 sm:h-8" /></button>
                                <h2 className="font-extrabold text-gray-800 text-2xl sm:text-3xl tracking-wide">{currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월</h2>
                                <button onClick={() => { setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1)); setSelectedDateStr(''); }} className="p-2 text-orange-600 active:bg-orange-100 rounded-full print-hide"><ChevronRight className="w-6 h-6 sm:w-8 sm:h-8" /></button>
                            </div>
                            
                            <div className="flex justify-end gap-3 max-w-6xl mx-auto px-4 mb-3 text-xs sm:text-sm font-bold text-gray-600">
                                <div className="flex items-center"><span className="w-2.5 h-2.5 sm:w-3 sm:h-3 bg-blue-100 border border-blue-300 rounded-full mr-1.5"></span>운전(1명)</div>

                            </div>
                            
                            <div className="max-w-6xl mx-auto">
                                {/* 💡 [핵심] grid-cols-5로 변경하여 화면을 5칸(월~금)으로 나누었습니다. */}
                                <div className="grid grid-cols-5 bg-gray-400 border-2 border-gray-400 gap-[1.5px] rounded-xl overflow-hidden shadow-sm">
                                    {weekDays.map((day, index) => <div key={`header-${day}`} className={`bg-gray-100 py-2 sm:py-3 text-center font-extrabold text-xs min-[380px]:text-sm sm:text-base lg:text-lg text-gray-800`}>{day}</div>)}
                                    {getCalendarDays().map((dayObj, index) => {
                                        const date = dayObj.date; const dateStr = formatDate(date); const daySchedule = dayObj.isCurrentMonth ? (schedule[dateStr] || { driver: null, general: [] }) : null;
                                        const isSelected = selectedDateStr === dateStr; const isToday = dayObj.isCurrentMonth && (formatDate(new Date()) === dateStr);
                                        const holidayName = HOLIDAYS[dateStr]; const isDayOff = !!holidayName; 

                                        return (
                                            <div key={`${dateStr}-${index}`} onClick={() => handleDayClick(dayObj)} className={`calendar-cell bg-white min-h-[75px] min-[380px]:min-h-[85px] sm:min-h-[110px] md:min-h-[130px] lg:min-h-[150px] p-1 sm:p-2 md:p-3 relative transition-all flex flex-col ${!dayObj.isCurrentMonth ? '' : (canApply && !isDayOff ? 'cursor-pointer active:bg-orange-50' : 'cursor-not-allowed opacity-80 bg-gray-50/30')} ${isSelected ? 'ring-4 ring-inset ring-orange-500 bg-orange-50 z-10' : (isToday ? 'ring-2 ring-inset ring-orange-200' : '')}`}>
                                                <div className={`text-sm min-[380px]:text-base sm:text-lg md:text-xl lg:text-2xl mb-1 pl-0.5 sm:pl-1 flex flex-col ${!dayObj.isCurrentMonth ? 'text-gray-300 font-normal' : (holidayName ? 'text-red-500 font-extrabold' : 'text-gray-800 font-extrabold')}`}>
                                                    <span>{date.getDate()}</span>
                                                    {dayObj.isCurrentMonth && holidayName && <span className="text-[8px] min-[380px]:text-[9px] sm:text-[11px] md:text-xs lg:text-sm text-red-400 font-bold leading-none mt-0.5 md:mt-1">{holidayName}</span>}
                                                </div>
                                                {dayObj.isCurrentMonth && daySchedule && (
                                                    <div className="space-y-0.5 sm:space-y-1 lg:space-y-1.5 mt-auto">
                                                        {daySchedule.driver && (
                                                            <div className="bg-blue-50 border border-blue-200 text-blue-800 text-[10px] min-[380px]:text-[11px] sm:text-sm md:text-base lg:text-lg rounded-sm sm:rounded-md px-1 py-0.5 sm:px-1.5 sm:py-1 md:px-2 md:py-1.5 truncate flex items-center font-bold shadow-sm">
                                                                <CarIcon className="w-2.5 h-2.5 min-[380px]:w-3 min-[380px]:h-3 sm:w-4 sm:h-4 md:w-5 md:h-5 mr-0.5 sm:mr-1 md:mr-1.5 shrink-0 print-hide text-blue-500"/>
                                                                {daySchedule.driver.name}
                                                            </div>
                                                        )}
                                                        {!daySchedule.driver && !isDayOff && (
                                                            <div className="border border-dashed border-orange-300 text-orange-600 bg-orange-50/50 text-[10px] min-[380px]:text-[11px] sm:text-sm md:text-base lg:text-lg rounded-sm sm:rounded-md px-1 py-0.5 sm:px-1.5 sm:py-1 md:px-2 md:py-1.5 text-center font-bold print-hide tracking-tighter sm:tracking-normal">
                                                                운전필요
                                                            </div>
                                                        )}
                                                        {daySchedule.general.map((p, i) => (
                                                            <div key={i} className="bg-green-50 border border-green-200 text-green-800 text-[10px] min-[380px]:text-[11px] sm:text-sm md:text-base lg:text-lg rounded-sm sm:rounded-md px-1 py-0.5 sm:px-1.5 sm:py-1 md:px-2 md:py-1.5 truncate flex items-center font-bold shadow-sm">
                                                                <UserIcon className="w-2.5 h-2.5 min-[380px]:w-3 min-[380px]:h-3 sm:w-4 sm:h-4 md:w-5 md:h-5 mr-0.5 sm:mr-1 md:mr-1.5 shrink-0 print-hide text-green-500"/>
                                                                {p.name}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 하단 고정 4버튼 */}

                                            )}
                                        </div>
                                        
                                        <div><label className="block text-sm font-bold text-gray-700 mb-2">비밀번호 확인/수정</label><input type="password" pattern="[0-9]*" inputMode="numeric" maxLength="4" value={applicantPin} onChange={(e) => { setApplicantPin(e.target.value.replace(/[^0-9]/g, '')); setFormError(''); }} className="w-full bg-gray-50 border border-gray-200 px-4 py-3.5 rounded-xl text-base outline-none focus:border-blue-500 tracking-[0.5em] text-center font-bold" placeholder="••••" /></div>

                                        <div className="flex gap-2"><button type="button" onClick={() => setEditStep(1)} className="flex-1 py-4 bg-gray-100 text-gray-700 rounded-2xl font-bold">다시 찾기</button><button type="submit" className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-md">수정 저장</button></div>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* 취소 모달 */}
                    {isDeleteModalOpen && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl">
                                {matchedCandidates.length > 0 ? (
                                    <div>
                                        <h3 className="text-xl font-bold text-gray-900 mb-6 flex items-center"><TrashIcon className="w-6 h-6 mr-2 text-gray-500" /> 취소할 대상 선택</h3>
                                        <div className="space-y-3 mb-6 max-h-[40vh] overflow-y-auto hide-scroll pr-1">
                                            {matchedCandidates.map((c, i) => <button key={i} onClick={() => executeDelete(c)} className="w-full p-4 rounded-2xl border-2 border-gray-200 flex justify-between items-center bg-white active:bg-red-50 transition-colors"><div className="flex items-center">{c.role === 'driver' ? <CarIcon className="w-5 h-5 mr-3 text-blue-500"/> : <UserIcon className="w-5 h-5 mr-3 text-green-500"/>}<span className="font-bold text-lg text-gray-800">{c.name} <span className="text-sm font-normal text-gray-500 ml-1">({c.role === 'driver' ? '운전' : '일반'})</span></span></div><span className="text-red-500 text-sm font-bold">삭제</span></button>)}
                                        </div>
                                        <button onClick={() => setMatchedCandidates([])} className="w-full py-4 bg-gray-100 text-gray-700 rounded-2xl font-bold">돌아가기</button>
                                    </div>
                                ) : (
                                    <div>
                                        <div className="flex justify-between items-center mb-6"><h3 className="text-xl font-bold text-gray-900 flex items-center"><TrashIcon className="w-6 h-6 mr-2 text-gray-500" /> 신청 취소</h3><button onClick={() => setIsDeleteModalOpen(false)} className="text-gray-400 bg-gray-100 p-2 rounded-full active:bg-gray-200"><XIcon className="w-5 h-5" /></button></div>
                                        <form onSubmit={handleDeleteSearch} className="space-y-5">
                                            {formError && <div className="bg-red-50 p-3 rounded-xl flex items-start text-red-600 text-sm font-medium border border-red-100"><AlertCircle className="w-5 h-5 mr-1.5 shrink-0" /> {formError}</div>}
                                            <div><label className="block text-sm font-bold text-gray-700 mb-2">날짜</label><input type="date" value={targetDate} onChange={(e) => { setTargetDate(e.target.value); setFormError(''); }} className="w-full bg-gray-50 border border-gray-200 px-4 py-3.5 rounded-xl text-base outline-none focus:border-gray-500 font-bold" /></div>
                                            <div><label className="block text-sm font-bold text-gray-700 mb-2">비밀번호 4자리</label><input type="password" pattern="[0-9]*" inputMode="numeric" maxLength="4" value={targetPinInput} onChange={(e) => { setTargetPinInput(e.target.value.replace(/[^0-9]/g, '')); setFormError(''); }} className="w-full bg-gray-50 border border-gray-300 px-4 py-3.5 rounded-xl text-lg outline-none focus:border-red-500 tracking-[0.5em] text-center font-bold" placeholder="••••" /></div>
                                            <div className="flex gap-2 pt-2"><button type="button" onClick={() => setIsDeleteModalOpen(false)} className="flex-1 py-4 bg-gray-100 text-gray-700 rounded-2xl font-bold">닫기</button><button type="submit" className="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold shadow-md">취소 확인</button></div>
                                        </form>
                                        {isAdmin && (
                                            <div className="mt-4 pt-4 border-t border-gray-200">
                                                <button type="button" onClick={handleAdminOverrideSearch} className="w-full py-3.5 bg-gray-800 text-white rounded-2xl font-bold shadow-md flex items-center justify-center active:scale-95 transition-transform">
                                                    👑 관리자 권한으로 모두 보기 (PW 생략)
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {successDialog.isOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4 print-hide">
                            <div className="bg-white rounded-3xl w-full max-w-sm p-6 text-center shadow-2xl">
                                <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-500"><svg className="w-8 h-8" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                                <h3 className="text-xl font-bold text-gray-900 mb-2">신청이 완료되었습니다!</h3>
                                <p className="text-sm text-gray-600 mb-6">스마트폰 달력에 일정을 추가해두시면<br/>잊지 않고 참석하실 수 있어요.</p>
                                <div className="space-y-2.5">
                                    <button onClick={() => { handleDownloadICS(successDialog.dateStr, successDialog.roleStr); setSuccessDialog({ isOpen: false, dateStr: '', roleStr: '' }); }} className="w-full py-4 bg-orange-600 text-white rounded-2xl font-bold text-base shadow-md active:bg-orange-700 flex items-center justify-center transition-transform active:scale-95"><CalendarPlusIcon className="w-5 h-5 mr-2" /> 스마트폰 달력에 저장하기</button>
                                    <button onClick={() => setSuccessDialog({ isOpen: false, dateStr: '', roleStr: '' })} className="w-full py-3.5 bg-gray-100 text-gray-700 rounded-2xl font-bold text-sm active:bg-gray-200 transition-colors">괜찮습니다 (닫기)</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {toastMessage.show && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[60] print-hide">
                            <div className={`text-white px-6 py-3 rounded-full shadow-lg text-sm font-bold whitespace-nowrap ${toastMessage.type === 'error' ? 'bg-red-600' : 'bg-gray-800'}`}>{toastMessage.message}</div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        const manifest = {
            "name": "나눔과기쁨 봉사 일정표",
            "short_name": "봉사일정",
            "start_url": window.location.href,
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#ea580c",
            "icons": [{ "src": "IMG_1347.jpeg", "sizes": "512x512", "type": "image/jpeg", "purpose": "any maskable" }]
        };
        const manifestUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/json' }));
        document.getElementById('manifest-placeholder').setAttribute('href', manifestUrl);

        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'volunteer-app-v30';
                self.addEventListener('install', (event) => self.skipWaiting());
                self.addEventListener('activate', (event) => self.clients.claim());
                self.addEventListener('fetch', (event) => {
                    event.respondWith(fetch(event.request).catch(() => new Response('오프라인 상태입니다.')));
                });
            `;
            const swUrl = URL.createObjectURL(new Blob([swCode], { type: 'application/javascript' }));
            window.addEventListener('load', () => navigator.serviceWorker.register(swUrl).catch(console.log));
        }
    </script>
</body>
</html>
