<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA 메타 태그 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="봉사일정">
    <meta name="theme-color" content="#ea580c">
    <title>나눔과기쁨 봉사 일정표 (PWA)</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (브라우저에서 JSX 및 모듈 변환) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link id="manifest-placeholder" rel="manifest" href="">
    <!-- 브라우저 탭 아이콘도 올려주신 이미지로 변경 (선택 사항) -->
    <link rel="icon" href="img_1347.png">
</head>
<body class="bg-gray-50 antialiased overflow-x-hidden selection:bg-orange-200">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==============================================================
        // ☁️ Firebase 초기화
        // ==============================================================
        const firebaseConfig = {
  apiKey: "AIzaSyB7dTDbRW8L5vsipfBOphrMWs7Rzkm7ImI",
  authDomain: "nanum-volunteer.firebaseapp.com",
  databaseURL: "https://nanum-volunteer-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nanum-volunteer",
  storageBucket: "nanum-volunteer.firebasestorage.app",
  messagingSenderId: "720660924695",
  appId: "1:720660924695:web:84c6f21570033c00454f52",
  measurementId: "G-FQM351TMD6"
};

        // Firebase 시작 및 필수 서비스(인증, 데이터베이스) 설정
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'nanum-volunteer-app';

        const { useState, useEffect } = React;

        // --- SVG 아이콘 컴포넌트 ---
        const ChevronLeft = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const ChevronRight = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const CarIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a2 2 0 0 0-1.6-.8H9.3a2 2 0 0 0-1.6.8L5 11l-5.16.86a1 1 0 0 0-.84.99V16h3m10 0a2 2 0 1 1-4 0m4 0a2 2 0 1 0-4 0m-10 0a2 2 0 1 1-4 0m4 0a2 2 0 1 0-4 0"></path></svg>;
        const UserIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const XIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const AlertCircle = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;

        function App() {
            // 앱 상태 관리
            const [user, setUser] = useState(null);
            const [currentDate, setCurrentDate] = useState(() => {
                const today = new Date();
                return new Date(today.getFullYear(), today.getMonth() + 1, 1);
            });
            const [schedule, setSchedule] = useState({});
            
            // 모달 및 폼 상태
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedDate, setSelectedDate] = useState(null);
            const [applicantName, setApplicantName] = useState('');
            const [applicantPin, setApplicantPin] = useState('');
            const [applicantRole, setApplicantRole] = useState('general');
            const [formError, setFormError] = useState('');
            
            // 삭제 확인 및 토스트 상태
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, dateStr: null, role: null, index: null, expectedPin: '' });
            const [deletePinInput, setDeletePinInput] = useState('');
            const [toastMessage, setToastMessage] = useState({ show: false, message: '', type: '' });
            const [authError, setAuthError] = useState(''); 
            
            // PWA 설치 상태
            const [isInstallable, setIsInstallable] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);

            const weekDays = ['일', '월', '화', '수', '목', '금', '토'];

            // 1. Firebase 익명 로그인 (누구나 데이터를 쓰고 읽을 수 있게 함)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (customTokenError) {
                                console.warn("커스텀 토큰 로그인 실패, 익명 로그인으로 전환합니다.", customTokenError);
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("최종 인증 실패:", error);
                        if (error?.code === 'auth/configuration-not-found' || error?.code === 'auth/admin-restricted-operation') {
                            setAuthError('Firebase 파이어베이스 콘솔에서 [Authentication -> 익명 로그인] 기능이 켜져 있는지 확인해주세요. (가이드 4단계)');
                        } else {
                            setAuthError('로그인 연결에 실패했습니다: ' + error.message);
                        }
                    }
                };
                initAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, setUser);
                return () => unsubscribeAuth();
            }, []);

            // 2. 실시간 데이터 동기화 (Firestore)
            useEffect(() => {
                if (!user) return; // 로그인 완료 전까지 대기

                const schedulesRef = collection(db, 'artifacts', appId, 'public', 'data', 'schedules');
                
                // 데이터베이스가 변경될 때마다 화면에 즉시 자동 반영
                const unsubscribeSnapshot = onSnapshot(schedulesRef, (snapshot) => {
                    const newSchedule = {};
                    snapshot.forEach(doc => {
                        newSchedule[doc.id] = doc.data();
                    });
                    setSchedule(newSchedule);
                }, (error) => {
                    console.error("데이터 동기화 오류:", error);
                });

                return () => unsubscribeSnapshot();
            }, [user]);

            // 3. PWA 설치 프롬프트 감지
            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setIsInstallable(true);
                });
            }, []);

            // PWA 설치 버튼 클릭 핸들러
            const handleInstallClick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') setIsInstallable(false);
                    setDeferredPrompt(null);
                } else {
                    showToast('브라우저 메뉴에서 "홈 화면에 추가"를 선택해주세요.', 'info');
                }
            };

            // 헬퍼 함수들
            const formatDate = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const showToast = (message, type = 'info') => {
                setToastMessage({ show: true, message, type });
                setTimeout(() => setToastMessage({ show: false, message: '', type: '' }), 2500);
            };

            const getCalendarDays = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));
                return days;
            };

            // 날짜 클릭 (신청 창 열기)
            const handleDayClick = (date) => {
                if (!date) return;
                const dayOfWeek = date.getDay();
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    showToast('주말 및 공휴일은 봉사가 없습니다.', 'error');
                    return;
                }
                setSelectedDate(date);
                setApplicantName('');
                setApplicantPin('');
                setApplicantRole('general');
                setFormError('');
                setIsModalOpen(true);
            };

            // 4. 새로운 신청 제출 (클라우드에 저장)
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) {
                    setFormError('서버에 연결 중입니다. 잠시 후 다시 시도해주세요.');
                    return;
                }
                if (!applicantName.trim()) {
                    setFormError('이름을 입력해주세요.');
                    return;
                }
                if (applicantPin.length !== 4) {
                    setFormError('비밀번호 숫자 4자리를 입력해주세요.');
                    return;
                }

                const dateStr = formatDate(selectedDate);
                const dayData = schedule[dateStr] || { driver: null, general: [] };
                let newDayData = { ...dayData };

                // 유효성 검사 및 데이터 병합
                if (applicantRole === 'driver') {
                    if (dayData.driver) {
                        setFormError('이미 신청자가 찼습니다. 다른 날로 선택해 주세요.');
                        return;
                    }
                    newDayData.driver = { name: applicantName.trim(), pin: applicantPin };
                } else {
                    if (dayData.general.length >= 2) {
                        setFormError('이미 신청자가 찼습니다. 다른 날로 선택해 주세요.');
                        return;
                    }
                    newDayData.general = [...dayData.general, { name: applicantName.trim(), pin: applicantPin }];
                }

                try {
                    // 서버 응답을 기다리기 전에 모달창을 즉시 닫아줍니다 (빠른 반응성)
                    setIsModalOpen(false);
                    
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', dateStr);
                    await setDoc(docRef, newDayData); // Firestore 저장
                    showToast(`${selectedDate.getDate()}일 신청이 완료되었습니다.`, 'success');
                } catch(err) {
                    console.error("저장 실패:", err);
                    showToast('서버 오류로 신청에 실패했습니다.', 'error');
                }
            };

            // 5. 삭제 요청 (모달 띄우기)
            const handleRemoveRequest = (e, dateStr, role, index = null) => {
                e.stopPropagation(); // 달력 클릭 이벤트 방지
                const dayData = schedule[dateStr];
                let expectedPin = '';
                
                // 해당 봉사자의 원래 비밀번호 가져오기
                if (role === 'driver') expectedPin = dayData.driver.pin;
                else expectedPin = dayData.general[index].pin;
                
                setConfirmDialog({ isOpen: true, dateStr, role, index, expectedPin });
                setDeletePinInput('');
            };

            // 6. 삭제 완료 확인 (클라우드 데이터 업데이트)
            const confirmRemove = async () => {
                const { dateStr, role, index, expectedPin } = confirmDialog;
                
                if (deletePinInput !== expectedPin) {
                    showToast('비밀번호가 일치하지 않습니다.', 'error');
                    return;
                }

                const currentDayData = schedule[dateStr];
                if (!currentDayData) return;
                
                let dayData = { ...currentDayData, general: [...currentDayData.general] };
                
                if (role === 'driver') dayData.driver = null;
                else if (role === 'general' && index !== null) dayData.general.splice(index, 1);

                try {
                    // 삭제 창을 즉시 닫아줍니다
                    setConfirmDialog({ isOpen: false, dateStr: null, role: null, index: null, expectedPin: '' });
                    
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', dateStr);
                    if (!dayData.driver && dayData.general.length === 0) {
                        await deleteDoc(docRef); // 남은 사람이 없으면 문서 전체 삭제
                    } else {
                        await setDoc(docRef, dayData); // 남은 사람이 있으면 업데이트
                    }
                    showToast('신청이 취소되었습니다.', 'success');
                } catch(err) {
                    console.error("삭제 실패:", err);
                    showToast('서버 오류로 취소에 실패했습니다.', 'error');
                }
            };

            return (
                <div className="min-h-[100dvh] bg-gray-50 flex flex-col font-sans">
                    {/* 상단 헤더 영역 */}
                    <header className="bg-orange-50 px-4 py-5 border-b border-orange-100 flex flex-col gap-4">
                        <div className="flex justify-between items-start">
                            <div>
                                {/* 제목 옆에 이미지 로고를 추가했습니다 */}
                                <h1 className="text-xl sm:text-2xl font-bold text-orange-900 flex items-center">
                                    <img 
                                        src="IMG_1347.jpeg" 
                                        alt="로고" 
                                        className="w-7 h-7 sm:w-8 sm:h-8 mr-2 rounded-full object-cover border border-orange-200 shadow-sm"
                                        onError={(e) => {
                                            // 이미지를 찾을 수 없을 때 임시 아이콘으로 대체
                                            e.target.onerror = null;
                                            e.target.style.display = 'none';
                                            e.target.nextSibling.style.display = 'block';
                                        }}
                                    />
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-7 h-7 sm:w-8 sm:h-8 mr-2 text-orange-500 hidden"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                    나눔과기쁨 봉사 일정
                                </h1>
                                <p className="text-orange-700 mt-1 text-xs">매월 마지막 주 다음 달 신청 (평일만)</p>
                            </div>
                            
                            {/* PWA 앱 설치 버튼 */}
                            {isInstallable && (
                                <button 
                                    onClick={handleInstallClick}
                                    className="bg-orange-600 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-sm active:bg-orange-700"
                                >
                                    앱 설치하기
                                </button>
                            )}
                        </div>

                        {/* 달 선택 내비게이션 */}
                        <div className="flex items-center bg-white rounded-full p-1 shadow-sm border border-orange-100 justify-between max-w-sm mx-auto w-full">
                            <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className="p-2 text-orange-600 active:bg-orange-100 rounded-full">
                                <ChevronLeft className="w-5 h-5" />
                            </button>
                            <span className="font-bold text-gray-800 text-base">
                                {currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월
                            </span>
                            <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className="p-2 text-orange-600 active:bg-orange-100 rounded-full">
                                <ChevronRight className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    {/* 인증 에러 발생 시 안내 메시지 */}
                    {authError && (
                        <div className="bg-red-50 border-l-4 border-red-500 p-4 m-4 rounded-md shadow-sm">
                            <div className="flex items-start">
                                <AlertCircle className="w-5 h-5 text-red-500 mr-2 shrink-0 mt-0.5" />
                                <p className="text-sm font-bold text-red-700">{authError}</p>
                            </div>
                        </div>
                    )}

                    {/* 안내 범례 */}
                    <div className="bg-white px-4 py-2 border-b border-gray-100 flex gap-3 text-xs text-gray-600 justify-end">
                        <div className="flex items-center"><span className="w-2.5 h-2.5 bg-blue-100 border border-blue-200 rounded-full mr-1.5"></span>운전(1명)</div>
                        <div className="flex items-center"><span className="w-2.5 h-2.5 bg-green-100 border border-green-200 rounded-full mr-1.5"></span>일반(2명)</div>
                    </div>

                    {/* 메인 달력 그리드 */}
                    <div className="flex-1 p-2 sm:p-4 pb-10">
                        <div className="grid grid-cols-7 gap-[1px] bg-gray-400 border border-gray-400 rounded-xl overflow-hidden max-w-5xl mx-auto">
                            {weekDays.map((day, index) => (
                                <div key={`header-${day}`} className={`bg-gray-50 py-2 text-center font-bold text-sm sm:text-base ${index === 0 ? 'text-red-600' : index === 6 ? 'text-blue-600' : 'text-gray-700'}`}>
                                    {day}
                                </div>
                            ))}
                            
                            {getCalendarDays().map((date, index) => {
                                if (!date) return <div key={`empty-${index}`} className="bg-gray-50/50 min-h-[80px]"></div>;

                                const dateStr = formatDate(date);
                                const dayOfWeek = date.getDay();
                                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                                const daySchedule = schedule[dateStr] || { driver: null, general: [] };
                                const isToday = formatDate(new Date()) === dateStr;

                                return (
                                    <div 
                                        key={dateStr}
                                        onClick={() => handleDayClick(date)}
                                        className={`bg-white min-h-[80px] sm:min-h-[100px] p-1 sm:p-2 relative active:bg-orange-50 transition-colors
                                            ${isWeekend ? 'bg-gray-50/80' : 'cursor-pointer'}
                                            ${isToday ? 'ring-2 ring-inset ring-orange-400' : ''}
                                        `}
                                    >
                                        <div className={`font-bold text-base sm:text-lg mb-1 pl-0.5 ${isWeekend ? 'text-gray-500' : 'text-gray-800'} ${dayOfWeek === 0 ? 'text-red-500' : dayOfWeek === 6 ? 'text-blue-500' : ''}`}>
                                            {date.getDate()}
                                        </div>
                                        
                                        {!isWeekend && (
                                            <div className="space-y-0.5">
                                                {/* 운전 봉사자 */}
                                                {daySchedule.driver && (
                                                    <div className="bg-blue-50 border border-blue-100 text-blue-700 text-[10px] sm:text-xs rounded px-1 py-0.5 flex items-center justify-between">
                                                        <span className="truncate w-full flex items-center">
                                                            <CarIcon className="w-3 h-3 mr-1 shrink-0"/>{daySchedule.driver.name}
                                                        </span>
                                                        <button onClick={(e) => handleRemoveRequest(e, dateStr, 'driver')} className="ml-1 text-blue-400 active:text-blue-600 p-0.5 rounded-full active:bg-blue-200">
                                                            <XIcon className="w-3 h-3" />
                                                        </button>
                                                    </div>
                                                )}
                                                
                                                {/* 운전자 필요 안내 문구 */}
                                                {!daySchedule.driver && (
                                                    <div className="border border-dashed border-orange-300 text-orange-500 bg-orange-50/50 text-[10px] sm:text-xs rounded px-1 py-0.5 flex items-center justify-center">
                                                        <CarIcon className="w-3 h-3 mr-1 shrink-0 opacity-70"/>운전자 필요
                                                    </div>
                                                )}
                                                
                                                {/* 일반 봉사자 리스트 */}
                                                {daySchedule.general.map((person, i) => (
                                                    <div key={i} className="bg-green-50 border border-green-100 text-green-700 text-[10px] sm:text-xs rounded px-1 py-0.5 flex items-center justify-between">
                                                        <span className="truncate w-full flex items-center">
                                                            <UserIcon className="w-3 h-3 mr-1 shrink-0"/>{person.name}
                                                        </span>
                                                        <button onClick={(e) => handleRemoveRequest(e, dateStr, 'general', i)} className="ml-1 text-green-400 active:text-green-600 p-0.5 rounded-full active:bg-green-200">
                                                            <XIcon className="w-3 h-3" />
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* 신청 작성 폼 모달 (바텀시트 스타일) */}
                    {isModalOpen && selectedDate && (
                        <div className="fixed inset-0 bg-black/50 z-40 flex flex-col justify-end">
                            <div className="bg-white rounded-t-3xl w-full p-5 pb-8 sm:max-w-md sm:mx-auto sm:rounded-3xl sm:mb-10 shadow-2xl animate-[translate-y-full_0.3s_ease-out]">
                                <div className="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-4 sm:hidden"></div>
                                <div className="flex justify-between items-center mb-5">
                                    <h3 className="text-lg font-bold text-gray-800">
                                        {selectedDate.getMonth() + 1}월 {selectedDate.getDate()}일 신청
                                    </h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-gray-400 bg-gray-100 p-2 rounded-full active:bg-gray-200">
                                        <XIcon className="w-5 h-5" />
                                    </button>
                                </div>

                                <form onSubmit={handleSubmit} className="space-y-5">
                                    {formError && (
                                        <div className="bg-red-50 p-3 rounded-xl flex items-start text-red-600 text-sm font-medium border border-red-100">
                                            <AlertCircle className="w-5 h-5 mr-1.5 shrink-0" /> {formError}
                                        </div>
                                    )}
                                    
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">봉사 분야 선택</label>
                                        <div className="flex gap-2">
                                            <button type="button" onClick={() => setApplicantRole('driver')} className={`flex-1 p-3 rounded-2xl border-2 flex flex-col items-center justify-center transition-all ${applicantRole === 'driver' ? 'border-blue-500 bg-blue-50' : 'border-gray-100 bg-white'}`}>
                                                <CarIcon className={`w-8 h-8 mb-1 ${applicantRole === 'driver' ? 'text-blue-600' : 'text-gray-400'}`} />
                                                <span className={`text-sm font-bold ${applicantRole === 'driver' ? 'text-blue-800' : 'text-gray-600'}`}>운전 봉사</span>
                                                <span className="text-[10px] text-gray-500 mt-0.5">정원 1명</span>
                                            </button>
                                            <button type="button" onClick={() => setApplicantRole('general')} className={`flex-1 p-3 rounded-2xl border-2 flex flex-col items-center justify-center transition-all ${applicantRole === 'general' ? 'border-green-500 bg-green-50' : 'border-gray-100 bg-white'}`}>
                                                <UserIcon className={`w-8 h-8 mb-1 ${applicantRole === 'general' ? 'text-green-600' : 'text-gray-400'}`} />
                                                <span className={`text-sm font-bold ${applicantRole === 'general' ? 'text-green-800' : 'text-gray-600'}`}>일반 봉사</span>
                                                <span className="text-[10px] text-gray-500 mt-0.5">정원 2명</span>
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">신청자 이름</label>
                                        <div className="relative">
                                            <input
                                                type="text"
                                                value={applicantName}
                                                onChange={(e) => { setApplicantName(e.target.value); setFormError(''); }}
                                                className="w-full bg-gray-50 border border-gray-200 px-4 py-3.5 rounded-xl text-base outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500"
                                                placeholder="이름을 입력하세요"
                                            />
                                            {applicantName && (
                                                <button type="button" onClick={() => setApplicantName('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 p-2 active:bg-gray-200 rounded-full">
                                                    <XIcon className="w-5 h-5" />
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">비밀번호 (숫자 4자리)</label>
                                        <input
                                            type="password"
                                            pattern="[0-9]*"
                                            inputMode="numeric"
                                            maxLength="4"
                                            value={applicantPin}
                                            onChange={(e) => { setApplicantPin(e.target.value.replace(/[^0-9]/g, '')); setFormError(''); }}
                                            className="w-full bg-gray-50 border border-gray-200 px-4 py-3.5 rounded-xl text-base outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 tracking-[0.5em] text-center font-bold"
                                            placeholder="••••"
                                        />
                                        <p className="text-[10px] text-gray-500 mt-1.5 ml-1">※ 일정 취소 시 사용됩니다.</p>
                                    </div>
                                    
                                    <button type="submit" className="w-full bg-orange-600 text-white text-lg font-bold py-4 rounded-2xl active:bg-orange-700 transition-colors shadow-md mt-2">
                                        신청 완료하기
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 취소(삭제) 확인 비밀번호 입력 모달 */}
                    {confirmDialog.isOpen && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-sm p-6 text-center shadow-2xl">
                                <div className="w-12 h-12 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500">
                                    <AlertCircle className="w-6 h-6" />
                                </div>
                                <h3 className="text-lg font-bold text-gray-900 mb-2">신청 취소</h3>
                                <p className="text-sm text-gray-600 mb-4">예약 시 입력했던 비밀번호를 입력해주세요.</p>
                                
                                <input
                                    type="password"
                                    pattern="[0-9]*"
                                    inputMode="numeric"
                                    maxLength="4"
                                    value={deletePinInput}
                                    onChange={(e) => setDeletePinInput(e.target.value.replace(/[^0-9]/g, ''))}
                                    className="w-full bg-gray-50 border border-gray-300 px-4 py-3 rounded-xl text-lg outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 tracking-[0.5em] text-center font-bold mb-6"
                                    placeholder="••••"
                                />

                                <div className="flex gap-2">
                                    <button onClick={() => setConfirmDialog({ isOpen: false, dateStr: null, role: null, index: null, expectedPin: '' })} className="flex-1 py-3.5 bg-gray-100 text-gray-700 rounded-xl font-bold text-base active:bg-gray-200">
                                        닫기
                                    </button>
                                    <button onClick={confirmRemove} className="flex-1 py-3.5 bg-red-600 text-white rounded-xl font-bold text-base active:bg-red-700">
                                        삭제하기
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 알림 토스트 메시지 */}
                    {toastMessage.show && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[60] transition-opacity">
                            <div className={`text-white px-6 py-3 rounded-full shadow-lg text-sm font-bold whitespace-nowrap
                                ${toastMessage.type === 'error' ? 'bg-red-600' : toastMessage.type === 'success' ? 'bg-gray-800' : 'bg-gray-700'}`}>
                                {toastMessage.message}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // React 앱 렌더링
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- PWA 기능 설정 (매니페스트 & 서비스워커) -->
    <script>
        const manifest = {
            "name": "나눔과기쁨 봉사 일정표",
            "short_name": "봉사일정",
            "start_url": window.location.href,
            "display": "standalone",
            "background_color": "#f9fafb",
            "theme_color": "#ea580c",
            "icons": [
                {
                    "src": "IMG_1347.jpeg",
                    "sizes": "512x512",
                    "type": "image/jpeg",
                    "purpose": "any maskable"
                }
            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const manifestUrl = URL.createObjectURL(manifestBlob);
        document.getElementById('manifest-placeholder').setAttribute('href', manifestUrl);

        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'volunteer-app-v1';
                self.addEventListener('install', (event) => self.skipWaiting());
                self.addEventListener('activate', (event) => self.clients.claim());
                self.addEventListener('fetch', (event) => {
                    event.respondWith(fetch(event.request).catch(() => new Response('오프라인 상태입니다.')));
                });
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(swBlob);

            window.addEventListener('load', () => {
                navigator.serviceWorker.register(swUrl)
                    .catch(error => console.log('Service Worker 등록 실패:', error));
            });
        }
    </script>
</body>
</html>
