<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA 메타 태그 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="봉사일정">
    <meta name="theme-color" content="#ea580c">
    <title>나눔과기쁨 봉사 일정표 (PWA)</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (브라우저에서 JSX 및 모듈 변환) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PDF 출력을 위한 외부 라이브러리 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous"></script>

    <link id="manifest-placeholder" rel="manifest" href="">
    <link rel="icon" href="IMG_1347.jpeg">
    
    <style>
        /* 인쇄할 때 배경색이 나오도록 하는 설정 */
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .print-hide { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50 antialiased overflow-x-hidden selection:bg-orange-200">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==============================================================
        // ☁️ Firebase 초기화
        // ==============================================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyB7dTDbRW8L5vsipfBOphrMWs7Rzkm7ImI",
                authDomain: "nanumvolunteer03.firebaseapp.com",
                projectId: "nanumvolunteer03",
                storageBucket: "nanumvolunteer03.firebasestorage.app",
                messagingSenderId: "720660924695",
                appId: "1:720660924695:web:84c6f21570033c00454f52"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'nanum-volunteer-app';

        const { useState, useEffect, useRef } = React;

        // --- SVG 아이콘 컴포넌트 ---
        const ChevronLeft = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const ChevronRight = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const CarIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a2 2 0 0 0-1.6-.8H9.3a2 2 0 0 0-1.6.8L5 11l-5.16.86a1 1 0 0 0-.84.99V16h3m10 0a2 2 0 1 1-4 0m4 0a2 2 0 1 0-4 0m-10 0a2 2 0 1 1-4 0m4 0a2 2 0 1 0-4 0"></path></svg>;
        const UserIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const XIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const AlertCircle = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        
        // 새로 추가된 기능 아이콘
        const RefreshIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>;
        const DownloadIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const TableIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="9" x2="9" y2="21"></line><line x1="15" y1="9" x2="15" y2="21"></line></svg>;
        const FileTextIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const PrinterIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [currentDate, setCurrentDate] = useState(() => {
                const today = new Date();
                return new Date(today.getFullYear(), today.getMonth() + 1, 1);
            });
            const [schedule, setSchedule] = useState({});
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedDate, setSelectedDate] = useState(null);
            const [applicantName, setApplicantName] = useState('');
            const [applicantPin, setApplicantPin] = useState('');
            const [applicantRole, setApplicantRole] = useState('general');
            const [formError, setFormError] = useState('');
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, dateStr: null, role: null, index: null, expectedPin: '' });
            const [deletePinInput, setDeletePinInput] = useState('');
            const [toastMessage, setToastMessage] = useState({ show: false, message: '', type: '' });
            const [authError, setAuthError] = useState(''); 
            
            const [isInstallable, setIsInstallable] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            
            // 출력 메뉴 상태
            const [isExportMenuOpen, setIsExportMenuOpen] = useState(false);
            const weekDays = ['일', '월', '화', '수', '목', '금', '토'];

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (error) {
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("인증 실패:", error);
                    }
                };
                initAuth();
                const unsubscribeAuth = onAuthStateChanged(auth, setUser);
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const schedulesRef = collection(db, 'artifacts', appId, 'public', 'data', 'schedules');
                const unsubscribeSnapshot = onSnapshot(schedulesRef, (snapshot) => {
                    const newSchedule = {};
                    snapshot.forEach(doc => { newSchedule[doc.id] = doc.data(); });
                    setSchedule(newSchedule);
                }, (error) => console.error("데이터 동기화 오류:", error));
                return () => unsubscribeSnapshot();
            }, [user]);

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setIsInstallable(true);
                });
            }, []);

            // === 출력 기능 로직 ===
            
            // 1. 강제 새로고침
            const handleRefresh = () => {
                window.location.reload();
            };

            // 2. 엑셀(CSV) 다운로드
            const handleExportExcel = () => {
                setIsExportMenuOpen(false);
                let csvContent = "\uFEFF날짜,요일,운전봉사(1명),일반봉사(1),일반봉사(2)\n";

                getCalendarDays().forEach(date => {
                    if(!date) return;
                    const dayOfWeek = date.getDay();
                    if(dayOfWeek === 0 || dayOfWeek === 6) return; // 주말 제외

                    const dateStr = formatDate(date);
                    const dayStr = weekDays[dayOfWeek];
                    const dayData = schedule[dateStr] || { driver: null, general: [] };
                    
                    const driver = dayData.driver ? dayData.driver.name : "";
                    const gen1 = dayData.general[0] ? dayData.general[0].name : "";
                    const gen2 = dayData.general[1] ? dayData.general[1].name : "";

                    csvContent += `${dateStr},${dayStr},${driver},${gen1},${gen2}\n`;
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `${currentDate.getFullYear()}년_${currentDate.getMonth()+1}월_봉사일정.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // 3. PDF 다운로드
            const handleExportPDF = () => {
                setIsExportMenuOpen(false);
                const element = document.getElementById('calendar-export-area');
                showToast('PDF 변환 중입니다. 잠시만 기다려주세요...', 'info');
                
                const opt = {
                    margin:       10,
                    filename:     `${currentDate.getFullYear()}년_${currentDate.getMonth()+1}월_봉사일정.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
                };

                window.html2pdf().set(opt).from(element).save().then(() => {
                    showToast('PDF 다운로드가 완료되었습니다.', 'success');
                });
            };

            // 4. 인쇄하기
            const handlePrint = () => {
                setIsExportMenuOpen(false);
                window.print();
            };

            const handleInstallClick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') setIsInstallable(false);
                    setDeferredPrompt(null);
                } else {
                    showToast('브라우저 메뉴에서 "홈 화면에 추가"를 선택해주세요.', 'info');
                }
            };

            const formatDate = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const showToast = (message, type = 'info') => {
                setToastMessage({ show: true, message, type });
                setTimeout(() => setToastMessage({ show: false, message: '', type: '' }), 2500);
            };

            const getCalendarDays = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));
                return days;
            };

            const handleDayClick = (date) => {
                if (!date) return;
                const dayOfWeek = date.getDay();
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    showToast('주말 및 공휴일은 봉사가 없습니다.', 'error');
                    return;
                }
                setSelectedDate(date);
                setApplicantName('');
                setApplicantPin('');
                setApplicantRole('general');
                setFormError('');
                setIsModalOpen(true);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) { setFormError('서버 연결 중입니다. 잠시 후 시도해주세요.'); return; }
                if (!applicantName.trim()) { setFormError('이름을 입력해주세요.'); return; }
                if (applicantPin.length !== 4) { setFormError('비밀번호 4자리를 입력해주세요.'); return; }

                const dateStr = formatDate(selectedDate);
                const dayData = schedule[dateStr] || { driver: null, general: [] };
                let newDayData = { ...dayData };

                if (applicantRole === 'driver') {
                    if (dayData.driver) { setFormError('이미 찼습니다. 다른 날을 선택해 주세요.'); return; }
                    newDayData.driver = { name: applicantName.trim(), pin: applicantPin };
                } else {
                    if (dayData.general.length >= 2) { setFormError('이미 찼습니다. 다른 날을 선택해 주세요.'); return; }
                    newDayData.general = [...dayData.general, { name: applicantName.trim(), pin: applicantPin }];
                }

                try {
                    setIsModalOpen(false);
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', dateStr);
                    await setDoc(docRef, newDayData);
                    showToast(`${selectedDate.getDate()}일 신청 완료`, 'success');
                } catch(err) {
                    showToast('서버 오류로 신청에 실패했습니다.', 'error');
                }
            };

            const handleRemoveRequest = (e, dateStr, role, index = null) => {
                e.stopPropagation();
                const dayData = schedule[dateStr];
                let expectedPin = role === 'driver' ? dayData.driver.pin : dayData.general[index].pin;
                setConfirmDialog({ isOpen: true, dateStr, role, index, expectedPin });
                setDeletePinInput('');
            };

            const confirmRemove = async () => {
                const { dateStr, role, index, expectedPin } = confirmDialog;
                if (deletePinInput !== expectedPin) { showToast('비밀번호 불일치', 'error'); return; }

                const currentDayData = schedule[dateStr];
                if (!currentDayData) return;
                
                let dayData = { ...currentDayData, general: [...currentDayData.general] };
                if (role === 'driver') dayData.driver = null;
                else if (role === 'general' && index !== null) dayData.general.splice(index, 1);

                try {
                    setConfirmDialog({ isOpen: false, dateStr: null, role: null, index: null, expectedPin: '' });
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', dateStr);
                    if (!dayData.driver && dayData.general.length === 0) await deleteDoc(docRef);
                    else await setDoc(docRef, dayData);
                    showToast('신청이 취소되었습니다.', 'success');
                } catch(err) {
                    showToast('서버 오류로 취소에 실패했습니다.', 'error');
                }
            };

            return (
                <div className="min-h-[100dvh] bg-gray-50 flex flex-col font-sans">
                    {/* 상단 헤더 영역 (인쇄 시 숨김) */}
                    <header className="bg-orange-50 px-4 py-5 border-b border-orange-100 flex flex-col gap-4 print-hide">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-xl sm:text-2xl font-bold text-orange-900 flex items-center">
                                    <img 
                                        src="IMG_1347.jpeg" 
                                        alt="로고" 
                                        className="w-7 h-7 sm:w-8 sm:h-8 mr-2 rounded-full object-cover border border-orange-200 shadow-sm"
                                        onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }}
                                    />
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-7 h-7 sm:w-8 sm:h-8 mr-2 text-orange-500 hidden"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                    나눔과기쁨 봉사 일정
                                </h1>
                            </div>
                            
                            {/* 새로고침 및 출력 버튼 그룹 (버튼 크기 대폭 확대) */}
                            <div className="flex gap-2 sm:gap-3 relative">
                                <button onClick={handleRefresh} className="bg-white border border-gray-200 text-gray-700 px-4 py-2 sm:px-5 sm:py-2.5 rounded-full shadow-sm text-sm sm:text-base font-bold active:bg-gray-100 flex items-center transition-colors">
                                    <RefreshIcon className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5" /> 새로고침
                                </button>
                                
                                <div className="relative">
                                    <button onClick={() => setIsExportMenuOpen(!isExportMenuOpen)} className="bg-orange-600 text-white px-4 py-2 sm:px-5 sm:py-2.5 rounded-full shadow-sm text-sm sm:text-base font-bold active:bg-orange-700 flex items-center transition-colors">
                                        <DownloadIcon className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5" /> 출력
                                    </button>
                                    
                                    {/* 출력 드롭다운 메뉴 (메뉴 크기 및 터치 영역 확대) */}
                                    {isExportMenuOpen && (
                                        <div className="absolute right-0 mt-2 w-36 sm:w-40 bg-white border border-gray-100 rounded-xl shadow-xl z-50 overflow-hidden">
                                            <button onClick={handleExportExcel} className="w-full text-left px-4 py-3.5 sm:py-4 text-sm sm:text-base font-bold text-gray-700 hover:bg-gray-50 flex items-center"><TableIcon className="w-5 h-5 mr-2.5 text-green-600"/> 엑셀 저장</button>
                                            <button onClick={handleExportPDF} className="w-full text-left px-4 py-3.5 sm:py-4 text-sm sm:text-base font-bold text-gray-700 hover:bg-gray-50 flex items-center border-t border-gray-50"><FileTextIcon className="w-5 h-5 mr-2.5 text-red-500"/> PDF 저장</button>
                                            <button onClick={handlePrint} className="w-full text-left px-4 py-3.5 sm:py-4 text-sm sm:text-base font-bold text-gray-700 hover:bg-gray-50 flex items-center border-t border-gray-50"><PrinterIcon className="w-5 h-5 mr-2.5 text-gray-600"/> 화면 인쇄</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </header>

                    {authError && (
                        <div className="bg-red-50 border-l-4 border-red-500 p-4 m-4 rounded-md shadow-sm print-hide">
                            <p className="text-sm font-bold text-red-700">{authError}</p>
                        </div>
                    )}

                    {/* === PDF/인쇄 출력 시 캡처되는 영역 시작 === */}
                    <div id="calendar-export-area" className="flex-1 bg-gray-50 pt-4 pb-10">
                        {/* 달 선택 내비게이션 (인쇄 영역 안으로 이동하여 제목처럼 보이게 함) */}
                        <div className="flex items-center bg-white rounded-full p-1 shadow-sm border border-gray-200 justify-between max-w-sm mx-auto w-full mb-4 print-hide">
                            <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className="p-2 text-orange-600 active:bg-orange-100 rounded-full">
                                <ChevronLeft className="w-5 h-5" />
                            </button>
                            <span className="font-bold text-gray-800 text-lg">
                                {currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월 봉사일정
                            </span>
                            <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className="p-2 text-orange-600 active:bg-orange-100 rounded-full">
                                <ChevronRight className="w-5 h-5" />
                            </button>
                        </div>
                        
                        {/* 인쇄/PDF용 전용 텍스트 제목 (평소엔 숨김, 인쇄할 때만 보임) */}
                        <h2 className="hidden print:block text-center text-2xl font-bold mb-4 text-gray-800">
                            {currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월 나눔과기쁨 봉사일정
                        </h2>

                        <div className="bg-transparent px-4 py-2 flex gap-3 text-xs text-gray-600 justify-end max-w-5xl mx-auto">
                            <div className="flex items-center"><span className="w-2.5 h-2.5 bg-blue-100 border border-blue-200 rounded-full mr-1.5"></span>운전(1명)</div>
                            <div className="flex items-center"><span className="w-2.5 h-2.5 bg-green-100 border border-green-200 rounded-full mr-1.5"></span>일반(2명)</div>
                        </div>

                        {/* 메인 달력 그리드 */}
                        <div className="px-2 sm:px-4">
                            <div className="grid grid-cols-7 gap-[1px] bg-gray-400 border border-gray-400 rounded-xl overflow-hidden max-w-5xl mx-auto">
                                {weekDays.map((day, index) => (
                                    <div key={`header-${day}`} className={`bg-gray-50 py-2 text-center font-bold text-sm sm:text-base ${index === 0 ? 'text-red-600' : index === 6 ? 'text-blue-600' : 'text-gray-700'}`}>
                                        {day}
                                    </div>
                                ))}
                                
                                {getCalendarDays().map((date, index) => {
                                    if (!date) return <div key={`empty-${index}`} className="bg-gray-50/50 min-h-[80px]"></div>;

                                    const dateStr = formatDate(date);
                                    const dayOfWeek = date.getDay();
                                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                                    const daySchedule = schedule[dateStr] || { driver: null, general: [] };
                                    const isToday = formatDate(new Date()) === dateStr;

                                    return (
                                        <div 
                                            key={dateStr}
                                            onClick={() => handleDayClick(date)}
                                            className={`bg-white min-h-[80px] sm:min-h-[100px] p-1 sm:p-2 relative active:bg-orange-50 transition-colors
                                                ${isWeekend ? 'bg-gray-50/80' : 'cursor-pointer'}
                                                ${isToday ? 'ring-2 ring-inset ring-orange-400 print:ring-0' : ''}
                                            `}
                                        >
                                            <div className={`font-bold text-base sm:text-lg mb-1 pl-0.5 ${isWeekend ? 'text-gray-500' : 'text-gray-800'} ${dayOfWeek === 0 ? 'text-red-500' : dayOfWeek === 6 ? 'text-blue-500' : ''}`}>
                                                {date.getDate()}
                                            </div>
                                            
                                            {!isWeekend && (
                                                <div className="space-y-0.5">
                                                    {daySchedule.driver && (
                                                        <div className="bg-blue-50 border border-blue-100 text-blue-700 text-[10px] sm:text-xs rounded px-1 py-0.5 flex items-center justify-between">
                                                            <span className="truncate w-full flex items-center">
                                                                <CarIcon className="w-3 h-3 mr-1 shrink-0 print-hide"/>{daySchedule.driver.name}
                                                            </span>
                                                            <button onClick={(e) => handleRemoveRequest(e, dateStr, 'driver')} className="ml-1 text-blue-400 active:text-blue-600 p-0.5 rounded-full print-hide">
                                                                <XIcon className="w-3 h-3" />
                                                            </button>
                                                        </div>
                                                    )}
                                                    
                                                    {!daySchedule.driver && (
                                                        <div className="border border-dashed border-orange-300 text-orange-500 bg-orange-50/50 text-[10px] sm:text-xs rounded px-1 py-0.5 flex items-center justify-center print-hide">
                                                            운전자 필요
                                                        </div>
                                                    )}
                                                    
                                                    {daySchedule.general.map((person, i) => (
                                                        <div key={i} className="bg-green-50 border border-green-100 text-green-700 text-[10px] sm:text-xs rounded px-1 py-0.5 flex items-center justify-between">
                                                            <span className="truncate w-full flex items-center">
                                                                <UserIcon className="w-3 h-3 mr-1 shrink-0 print-hide"/>{person.name}
                                                            </span>
                                                            <button onClick={(e) => handleRemoveRequest(e, dateStr, 'general', i)} className="ml-1 text-green-400 active:text-green-600 p-0.5 rounded-full print-hide">
                                                                <XIcon className="w-3 h-3" />
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    {/* === PDF/인쇄 캡처 영역 끝 === */}

                    {/* 신청 모달 */}
                    {isModalOpen && selectedDate && (
                        <div className="fixed inset-0 bg-black/50 z-40 flex flex-col justify-end print-hide">
                            <div className="bg-white rounded-t-3xl w-full p-5 pb-8 sm:max-w-md sm:mx-auto sm:rounded-3xl sm:mb-10 shadow-2xl">
                                <div className="flex justify-between items-center mb-5">
                                    <h3 className="text-lg font-bold text-gray-800">
                                        {selectedDate.getMonth() + 1}월 {selectedDate.getDate()}일 신청
                                    </h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-gray-400 bg-gray-100 p-2 rounded-full"><XIcon className="w-5 h-5" /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-5">
                                    {formError && (<div className="bg-red-50 p-3 rounded-xl flex items-start text-red-600 text-sm font-medium"><AlertCircle className="w-5 h-5 mr-1.5 shrink-0" /> {formError}</div>)}
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">봉사 분야 선택</label>
                                        <div className="flex gap-2">
                                            <button type="button" onClick={() => setApplicantRole('driver')} className={`flex-1 p-3 rounded-2xl border-2 flex flex-col items-center justify-center ${applicantRole === 'driver' ? 'border-blue-500 bg-blue-50' : 'border-gray-100 bg-white'}`}>
                                                <span className={`text-sm font-bold ${applicantRole === 'driver' ? 'text-blue-800' : 'text-gray-600'}`}>운전 봉사 (1명)</span>
                                            </button>
                                            <button type="button" onClick={() => setApplicantRole('general')} className={`flex-1 p-3 rounded-2xl border-2 flex flex-col items-center justify-center ${applicantRole === 'general' ? 'border-green-500 bg-green-50' : 'border-gray-100 bg-white'}`}>
                                                <span className={`text-sm font-bold ${applicantRole === 'general' ? 'text-green-800' : 'text-gray-600'}`}>일반 봉사 (2명)</span>
                                            </button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">신청자 이름</label>
                                        <input type="text" value={applicantName} onChange={(e) => { setApplicantName(e.target.value); setFormError(''); }} className="w-full bg-gray-50 border border-gray-200 px-4 py-3.5 rounded-xl text-base outline-none focus:border-orange-500" placeholder="이름을 입력하세요" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">비밀번호 (숫자 4자리)</label>
                                        <input type="password" pattern="[0-9]*" inputMode="numeric" maxLength="4" value={applicantPin} onChange={(e) => { setApplicantPin(e.target.value.replace(/[^0-9]/g, '')); setFormError(''); }} className="w-full bg-gray-50 border border-gray-200 px-4 py-3.5 rounded-xl text-base outline-none focus:border-orange-500 tracking-[0.5em] text-center font-bold" placeholder="••••" />
                                    </div>
                                    <button type="submit" className="w-full bg-orange-600 text-white text-lg font-bold py-4 rounded-2xl active:bg-orange-700">신청 완료하기</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 취소 모달 */}
                    {confirmDialog.isOpen && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 print-hide">
                            <div className="bg-white rounded-3xl w-full max-w-sm p-6 text-center shadow-2xl">
                                <h3 className="text-lg font-bold text-gray-900 mb-2">신청 취소</h3>
                                <p className="text-sm text-gray-600 mb-4">예약 시 입력했던 비밀번호를 입력해주세요.</p>
                                <input type="password" pattern="[0-9]*" inputMode="numeric" maxLength="4" value={deletePinInput} onChange={(e) => setDeletePinInput(e.target.value.replace(/[^0-9]/g, ''))} className="w-full bg-gray-50 border border-gray-300 px-4 py-3 rounded-xl text-lg outline-none focus:border-red-500 tracking-[0.5em] text-center font-bold mb-6" placeholder="••••" />
                                <div className="flex gap-2">
                                    <button onClick={() => setConfirmDialog({ isOpen: false, dateStr: null, role: null, index: null, expectedPin: '' })} className="flex-1 py-3.5 bg-gray-100 text-gray-700 rounded-xl font-bold text-base active:bg-gray-200">닫기</button>
                                    <button onClick={confirmRemove} className="flex-1 py-3.5 bg-red-600 text-white rounded-xl font-bold text-base active:bg-red-700">삭제하기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 토스트 */}
                    {toastMessage.show && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[60] print-hide">
                            <div className={`text-white px-6 py-3 rounded-full shadow-lg text-sm font-bold whitespace-nowrap ${toastMessage.type === 'error' ? 'bg-red-600' : 'bg-gray-800'}`}>
                                {toastMessage.message}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- PWA 기능 설정 -->
    <script>
        const manifest = {
            "name": "나눔과기쁨 봉사 일정표",
            "short_name": "봉사일정",
            "start_url": window.location.href,
            "display": "standalone",
            "background_color": "#f9fafb",
            "theme_color": "#ea580c",
            "icons": [{ "src": "IMG_1347.jpeg", "sizes": "512x512", "type": "image/jpeg", "purpose": "any maskable" }]
        };
        const manifestUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/json' }));
        document.getElementById('manifest-placeholder').setAttribute('href', manifestUrl);

        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (event) => self.skipWaiting());
                self.addEventListener('activate', (event) => self.clients.claim());
                self.addEventListener('fetch', (event) => {
                    event.respondWith(fetch(event.request).catch(() => new Response('오프라인 상태입니다.')));
                });
            `;
            const swUrl = URL.createObjectURL(new Blob([swCode], { type: 'application/javascript' }));
            window.addEventListener('load', () => navigator.serviceWorker.register(swUrl).catch(console.log));
        }
    </script>
</body>
</html>
